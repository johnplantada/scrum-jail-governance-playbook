# ============================================================
# {{PRODUCT}} GOVERNANCE — org-chart.yaml
# ============================================================
# The single source of truth for WHO exists and what each department may do. GitHub-native:
# no bot accounts, no channels — the Chairman is a GitHub username, wakes route on dept:*
# labels (wake-rules.yaml), and authorization is a merge/approval, not a chat reaction.
# The runtime scripts read this file (runner routing, pm setup stages, the blockers WIP
# warning, tier→model resolution). Spawn ceilings (max_subagents, global_max_agents) are
# the declared org-shape limits agents must not cross; can_spend / can_deploy are declared
# hints — the spend/deploy backstop is capability-absence plus the platform gates
# (workflow_dispatch-only deploy workflows, CODEOWNERS + branch protection).
#
# RULE: every agent has a parent; authority flows DOWN the tree.
# The Chairman (you, the human) holds the keys. Agents propose; your merge/approval decides.

chairman:
  github: "{{CHAIRMAN_GITHUB}}"   # decision authority: CODEOWNERS + manual workflow_dispatch of deploys

governance:
  # The gate vocabulary (ledger language — decisions.yaml `type`, issue/PR prose). In the
  # chat era these were reaction emojis a registrar parsed; authorization is now the
  # Chairman's merge (decisions.yaml PR) or manual deploy dispatch (workflow_dispatch).
  charter: classical_building   # 🏛️ new top-level department (decisions.yaml type: charter)
  sunset: coffin                # ⚰️ dissolve a department/team (type: sunset)
  fund: moneybag                # 💰 spend up to a stated ceiling (type: spend)
  ship: rocket                  # 🚀 prod deploy (the Chairman's manual workflow_dispatch)
  halt: octagonal_sign          # 🛑 whole-org stop — a .halt file; only a human clears it
  promote: gem                  # 💎 raise a department's model tier (type: promote)

limits:
  # Hard ceiling across the entire org. orggen computes it from the roster (every brain +
  # its full sub-agent fan-out); test_subagent_gate.py fails any chart whose arithmetic
  # exceeds it, so raising it is a deliberate, reviewed act (a charter PR), never drift.
  global_max_agents: {{GLOBAL_MAX_AGENTS}}

global:
  review_interval: {{REVIEW_INTERVAL}}    # wakes per iteration — the [REVIEW] cadence
  pi_interval: {{PI_INTERVAL}}          # iterations per PI (review_interval × pi_interval = wakes per PI)
  # Chairman-queue discipline (DESIGN.md invariant 2): once blockers.yaml holds more open
  # human-only entries than this, agents must not START new work whose critical path ends
  # in another human-only unlock — scripts/blockers.py prepends the WIP warning to the
  # queue injected into every wake prompt. Prompt-enforced. 0/absent disables the warning.
  unlock_wip_limit: {{UNLOCK_WIP_LIMIT}}
  # Canonical pm workflow stages, in order (DESIGN.md §2). The ONLY place the stage list
  # is defined — github-pm-setup.sh builds the Project's Stage field from it, and docs and
  # mandates must reference it rather than restate it.
  pm_stages: [To-Do, Doing, Staged, Demo, Done]
  # Holding columns — orthogonal PARKED states, NOT points in the pm_stages flow (safe.md).
  # Same board Stage field, valid move target, kept out of the ordered list, and exempt
  # from any forward auto-reconcile (a parked item with a PR stays parked).
  pm_holding_stages: [Blocked, On-Hold]
  # ── COMMISSIONING PINS — both REQUIRED; the org is not finished until they are set ──
  # These cannot be stamped: neither the board nor the queue epic exists until you have
  # created the org repo. Leaving them null is not a soft default — warden.py exits before
  # doing any work, and the Chairman gets NO queue. That exact omission cost a stamped org
  # five silent hours (patterns.md Pattern 14). Set them in RUNBOOK commissioning, then
  # re-pin here if either is ever recreated.
  chairman_queue_issue: null   # ← the UNTYPED epic whose sub-issues = what only the human can do
  pm_project_number: null      # ← the org Project's number (gh project <N>)
  # Pinned API model id per brain tier — the ONE place tier→model resolution lives.
  # Everything else — ledger, wake banners, budget brownouts, 💎 PROMOTE — keeps speaking
  # in tiers; a 💎 changes an AGENT's tier, editing THIS map upgrades what a tier means
  # org-wide. Update to current model ids when you stamp a new org.
  model_ids:
    haiku: claude-haiku-4-5
    sonnet: claude-sonnet-5
    opus: claude-opus-4-8

departments:
{{DEPARTMENTS}}
  # ── ADD MORE DEPARTMENTS BELOW ────────────────────────────────
  # A new top-level department is a Board act: a decisions.yaml PR (type: charter) whose
  # payload is the new block, opened via the board-proposals skill. The Chairman's merge
  # IS the 🏛️ — then the block above gets added in the same change.
