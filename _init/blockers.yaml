# Human-task ledger — the single source of truth for work that ONLY the Chairman can clear.
#
# Agents can talk, write code, and open PRs, but they cannot perform real-world unlocks (set
# cloud credentials, spend money, register accounts, provide URLs or a mailing address, or
# approve a prod deploy). When blocked on one, an agent records it here ONCE and goes quiet —
# it never re-posts a blocked STATUS. This ledger, not the chat stream, is what the Chairman
# scans to see "what does a human need to do."  (See blocker-ledger.md.)
#
# Contract:
#   - Agents READ this every cycle and may APPEND a new entry (state: open). They never clear one.
#   - The Chairman clears an entry (state: open -> cleared) once the action is done; clearing it
#     is what un-gates the work it `blocks` and wakes the org again.
#   - `scripts/blockers.py open` prints the open queue.
#
# kind:  external-input = a credential/URL/address/account only the human can supply
#        governance      = a Chairman emoji approval (💰 fund · 🚀 ship · 🏛️ charter · 💎 promote)

blockers: []
