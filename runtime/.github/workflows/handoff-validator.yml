# Typed-handoff validator (DESIGN.md §4) — the Actions successor to the chat-era Go
# validator + the Warden's malformed-payload citation (both demolished 2026-07-05;
# counter-ratchet satisfied: this replaces those, nothing else).
#
# Any issue/PR comment that leads a paragraph with [AGREEMENT] / [DEMO] / [CODEREVIEW] /
# [CLOSE] must carry a fenced yaml payload with that type's required keys (schema:
# scripts/handoff_check.py REQUIRED, documented in agents/_policy.md §handoffs). A
# malformed payload fails this run AND gets a reply naming the missing keys — the
# reply is a comment event, so the runner wakes the offending department to fix it.
#
# The org side sees [AGREEMENT] handoffs; [DEMO]/[CODEREVIEW] land on product-repo PRs
# — install scripts/templates/product-repo/handoff-validator.yml there for those.
name: handoff-validator

on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate:
    # Coarse prefilter; handoff_check.py applies the real paragraph-start marker rule
    # and exits 0 for prose that merely mentions a marker (even wrap-landed at col 0).
    if: contains(github.event.comment.body, '[AGREEMENT]') || contains(github.event.comment.body, '[DEMO]') || contains(github.event.comment.body, '[CODEREVIEW]') || contains(github.event.comment.body, '[CLOSE]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate the typed payload
        id: check
        env:
          BODY: ${{ github.event.comment.body }}
        run: |
          set +e
          printf '%s' "$BODY" | python3 scripts/handoff_check.py > problems.txt
          echo "rc=$?" >> "$GITHUB_OUTPUT"
          cat problems.txt
          exit 0
      - name: Reply with the missing keys
        if: steps.check.outputs.rc != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "⚠️ **Malformed typed handoff** — the payload does not match the schema:"
            echo
            echo '```'
            cat problems.txt
            echo '```'
            echo
            echo "Fix the fenced yaml payload and edit or repost the comment."
          } > reply.md
          gh api "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
            -F body=@reply.md
      - name: Fail the run on a malformed payload
        if: steps.check.outputs.rc != '0'
        run: exit 1
