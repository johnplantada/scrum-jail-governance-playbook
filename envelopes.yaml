# ============================================================
# SCRUM JAIL GOVERNANCE PLAYBOOK — envelopes.yaml reference
# ============================================================
# An "envelope" is the box of authority you give each agent.
# It lives inside org-chart.yaml under each department node.
# This file explains each field so you can tune them confidently.
#
# PRINCIPLE: start tight, loosen deliberately.
# The cost of a too-narrow envelope is one escalation.
# The cost of a too-wide envelope is your agent doing something
# you can't take back.

# ── ENVELOPE FIELDS ──────────────────────────────────────────

envelope_fields:
  max_subagents:
    type: integer
    default: 0
    description: >
      How many sub-teams this agent may spin up inside its own scope,
      WITHOUT a new Board approval. Set 0 if you don't want the agent
      delegating at all. Set 4 for a head-of-department who needs to
      sub-divide work. Crossing this limit requires a CHARTER to the Board.
    guidance: >
      Start at 0. Grant 2-4 only for departments that demonstrably need
      parallel work (e.g. Business running SEO + content simultaneously).

  daily_token_budget:
    type: integer
    unit: tokens
    default: 200000
    description: >
      Declared per-day token target for this agent. HONESTY NOTE: in the
      reference runtime this is a declared policy value, not a code-enforced
      cap — no code reads it to stop an agent mid-day. What actually bounds
      cost in practice: wake backpressure (a no-op wake costs zero tokens),
      state-change-only STATUS, tier-pinning, and auditing the spend ledger
      against this number. Wire a hard check into your wake runner if you
      need one.
    guidance: >
      200k = light/daily agent (haiku-tier work, terse output).
      500k = active department head (sonnet, daily cadence, multi-step reasoning).
      300k = CEO/opus (fewer wakes, denser thinking, strategic output).
      Never set higher than 1M without a Board-approved business case.

  can_spend:
    type: boolean
    default: false
    description: >
      Declares whether this agent may initiate real-money transactions
      (ads, SaaS subscriptions, contractor payments). HONESTY NOTE: this is
      a declared hint, not a switch — no runtime code branches on it. The
      real enforcement is capability-absence: agents hold no card, no
      payment token, no stored payment method. Keep it false so the
      declared policy matches the capability reality.
    guidance: >
      ALWAYS false for agents. Agents PROPOSE spend in a SPEND message;
      the Chairman reacts 💰 to approve a ceiling (the Registrar records
      the approval to #decisions); the agent then acts within that
      ceiling. Agents never hold the card — that absence, not this flag,
      is what makes rogue spend impossible.

  can_deploy:
    type: boolean
    default: false
    description: >
      Declares whether this agent may push to production without a human
      gate. HONESTY NOTE: like can_spend, this is a declared hint — no
      runtime code branches on it. The real enforcement lives outside the
      runtime: agents have no prod credentials, and the deploy pipeline
      sits behind branch protection + human review on the product repo.
    guidance: >
      ALWAYS false. Agents open PRs and post a DEPLOY message; the
      Chairman reacts 🚀 (recorded to #decisions). Only then does the
      deploy proceed — through the product repo's protected pipeline.
      Even "trivial" deploys go through this gate — it costs 10 seconds
      and has caught real accidents.

# ── REFERENCE ENVELOPES (copy-paste into org-chart.yaml) ────

reference_envelopes:

  minimal:
    # Read-only observer or summarizer agent. Cannot spawn or spend.
    max_subagents: 0
    daily_token_budget: 100000
    can_spend: false
    can_deploy: false

  light_worker:
    # Daily task executor (haiku-tier). Runs a checklist; no sub-teams.
    max_subagents: 0
    daily_token_budget: 200000
    can_spend: false
    can_deploy: false

  department_head:
    # Active department (sonnet). Can sub-team within 4-agent cap.
    max_subagents: 4
    daily_token_budget: 500000
    can_spend: false
    can_deploy: false

  ceo:
    # Strategic leader (opus). No sub-teams — escalates to Chairman instead.
    max_subagents: 0
    daily_token_budget: 300000
    can_spend: false
    can_deploy: false

# ── WHAT HAPPENS AT EACH LIMIT — AND WHAT ACTUALLY ENFORCES IT ──
#
# max_subagents exceeded  → ENFORCED IN CODE: the Registrar refuses the sub-team
#                           (hard ceiling, plus global_max_agents). The agent must
#                           post a CHARTER to the Board and wait.
# daily_token_budget      → NOT code-enforced (see the field note above). It is the
#                           number you audit the spend ledger against; the mechanisms
#                           that actually bound cost are wake backpressure and
#                           tier-pinning.
# can_spend / can_deploy  → hints, not switches — no runtime code branches on them.
#                           The real backstop is capability-absence: no payment
#                           credentials exist for an agent to use, and prod deploys
#                           are gated by branch protection + human review outside the
#                           runtime. The 💰/🚀 emoji gates are the human-in-the-loop
#                           approval interface + audit trail layered on top.
#
# A refused sub-team or an unapproved proposal is NOT an error. It is the governance
# protocol working correctly. Design your agents to propose-and-wait, not to retry
# until they get through.

# ── AGENT-LEVEL FIELDS (outside the envelope) ────────────────
# These sit on the department node itself, next to `model` and `bot_user_id` — not in the
# authority envelope. Both optional.
#
# voice   — a TTS voice name. If you run a voice console (Chairman talks to an agent, the
#           reply is read back), this is the voice that agent answers in. Omit if you don't.
# active  — set false to PAUSE an agent: the Registrar stops waking it, but its node stays in
#           the chart (channels, history, envelope intact) so re-enabling is a one-line flip.
#           Use it for a chartered department with no live outlet yet, rather than deleting it.
#           Default (absent) = active.

# ── GLOBAL CONFIG (org-chart.yaml `global:`) ─────────────────
# Org-wide knobs, all optional. These are policy/behavior tuning, NOT authority — an agent
# can't widen its own authority by editing them; that's what the envelope + emoji gates are for.
#
# model_ids            — tier (haiku/sonnet/opus) → exact API model id. The SINGLE source of
#                        truth for tier→model resolution. A 💎 PROMOTE changes an AGENT's tier;
#                        editing this map changes what a tier MEANS for the whole org. Pin ids so
#                        a provider's silent default can't drift you onto a different model.
# pm_stages            — the ordered kanban columns (e.g. To-Do, Doing, Staged, Demo, Done),
#                        defined in ONE place. The Demo column is the [DEMO]-gate queue (safe.md).
# review_interval      — wakes per SAFe iteration (safe.md). pi_interval — iterations per PI.
# broadcast_channels   — channels whose posts wake more than their owner.
# review_reviewers /   — trim the broadcast fan-out: which departments get an IMMEDIATE wake from
# broadcast_reviewers    a #reviews / #feedback post (everyone else catches it on their next
#                        natural cycle). This is the knob that tames the self-wake storm
#                        (patterns.md Pattern 11); unset = wake all.
# broadcast_stagger_seconds — spacing between broadcast wakes, departments first, CEO last, so
#                        each recipient's pre-gate can see the earlier replies and defer.
# collab_channel /     — the collaboration workspace (FIELD-NOTES §5): where the CEO posts a
# collab_participants /   [DELEGATE], the pair converge directly, and a thread runs up to
# collab_max_turns        collab_max_turns replies before escalating to the CEO as arbiter.
# voice_default        — default agent the voice console talks to.
# memory_channels_extra — extra channels the semantic-memory layer ingests that no department
#                        owns (the rest are derived from the chart automatically).
