# ============================================================
# SCRUM JAIL GOVERNANCE PLAYBOOK — envelopes.yaml reference
# ============================================================
# An "envelope" is the box of authority you give each agent.
# It lives inside org-chart.yaml under each department node.
# This file explains each field so you can tune them confidently.
#
# PRINCIPLE: start tight, loosen deliberately.
# The cost of a too-narrow envelope is one escalation.
# The cost of a too-wide envelope is your agent doing something
# you can't take back.
#
# LINEAGE: v1 ran these gates as Chairman emoji reactions (💰/🚀)
# verified by a deterministic Registrar service; retired 2026-07-05
# with the chat stack. The gates survived — only the mechanism
# translated to GitHub-native primitives (merges and environment
# approvals instead of reactions).

# ── ENVELOPE FIELDS ──────────────────────────────────────────

envelope_fields:
  max_subagents:
    type: integer
    default: 0
    description: >
      How many sub-teams this agent may spin up inside its own scope,
      WITHOUT a new Board approval. Set 0 if you don't want the agent
      delegating at all. Set 4 for a head-of-department who needs to
      sub-divide work. Crossing this limit requires a [CHARTER] entry
      appended to decisions.yaml by PR — the Chairman's merge is the
      approval. ENFORCED IN CODE: scripts/subagent_gate.py — a
      PreToolUse hook on the Agent/Task tools — counts spawns per wake
      and denies any call past this cap (0 = the first spawn is
      refused), the successor to v1's Registrar refusal, which retired
      with the chat stack. Fail-open outside a wake and on gate errors:
      the Chairman's own sessions are never capped, and a broken gate
      never bricks a cycle.
    guidance: >
      Start at 0. Grant 2-4 only for departments that demonstrably need
      parallel work (e.g. Business running SEO + content simultaneously).

  daily_token_budget:
    type: integer
    unit: tokens
    default: 200000
    description: >
      Per-day token budget for this agent — and, since the GitHub-native
      cutover, a CODE-ENFORCED one: scripts/budget_gate.py reads this
      field from org-chart.yaml, and agent-run.sh consults it before
      every model cycle. An over-budget agent gets a BROWNOUT, not a
      blackout: non-direct wakes (broadcasts, catch-up cycles) are
      SKIPPED, but DIRECT wakes — a runner-routed GitHub event such as
      the Chairman filing an issue, or a deploy failure — always run.
      A spent budget must never block the Chairman, and the overage
      stays visible in the log + ledger. Accounting: in + out tokens
      across today's state/spend.jsonl rows for this agent (cycles and
      offloads); cache reads are excluded — the budget bounds fresh
      work, and cached input is exactly the cost the org already
      optimized away. The gate fails OPEN: a broken meter browns out
      the metering, never the org.
    guidance: >
      200k = light/daily agent (haiku-tier work, terse output).
      500k = active department head (sonnet, daily cadence, multi-step reasoning).
      300k = CEO/opus (fewer wakes, denser thinking, strategic output).
      Never set higher than 1M without a Board-approved business case.
      Honest caveat: this is per-agent per-day and resets with the date —
      it caps burn RATE, not total dollars. The org-wide dollar backstop
      is the runner's spend breaker (see the section below).

  can_spend:
    type: boolean
    default: false
    description: >
      Declares whether this agent may initiate real-money transactions
      (ads, SaaS subscriptions, contractor payments). HONESTY NOTE: this is
      a declared hint, not a switch — no runtime code branches on it. The
      real enforcement is capability-absence: agents hold no card, no
      payment token, no stored payment method. Keep it false so the
      declared policy matches the capability reality.
    guidance: >
      ALWAYS false for agents. Agents PROPOSE spend by opening a PR that
      appends ONE entry to decisions.yaml (the entry schema lives in that
      file's header comments); .github/CODEOWNERS routes the PR to the
      Chairman, and the Chairman's MERGE is the authorization — the diff
      is exactly what was approved, and `git log decisions.yaml` is the
      audit trail. The agent then acts within the approved ceiling.
      Agents never hold the card — that absence, not this flag, is what
      makes rogue spend impossible.

  can_deploy:
    type: boolean
    default: false
    description: >
      Declares whether this agent may push to production without a human
      gate. HONESTY NOTE: like can_spend, this is a declared hint — no
      runtime code branches on it. The real enforcement lives on the
      platform: agents have no prod credentials, and every deploy pauses
      at the product repo's `production` environment, whose required
      reviewer is the Chairman.
    guidance: >
      ALWAYS false. Agents open PRs against the product repo; the deploy
      run then pauses at the `production` environment until the Chairman
      approves it in the GitHub UI. That approval is the authorization,
      and GitHub's environment deployment log is the audit trail. Even
      "trivial" deploys go through this gate — it costs 10 seconds and
      has caught real accidents.

# ── REFERENCE ENVELOPES (copy-paste into org-chart.yaml) ────

reference_envelopes:

  minimal:
    # Read-only observer or summarizer agent. Cannot spawn or spend.
    max_subagents: 0
    daily_token_budget: 100000
    can_spend: false
    can_deploy: false

  light_worker:
    # Daily task executor (haiku-tier). Runs a checklist; no sub-teams.
    max_subagents: 0
    daily_token_budget: 200000
    can_spend: false
    can_deploy: false

  department_head:
    # Active department (sonnet). Can sub-team within 4-agent cap.
    max_subagents: 4
    daily_token_budget: 500000
    can_spend: false
    can_deploy: false

  ceo:
    # Strategic leader (opus). No sub-teams — escalates to Chairman instead.
    max_subagents: 0
    daily_token_budget: 300000
    can_spend: false
    can_deploy: false

# ── WHAT HAPPENS AT EACH LIMIT — AND WHAT ACTUALLY ENFORCES IT ──
#
# max_subagents exceeded  → ENFORCED IN CODE: subagent_gate.py (a PreToolUse hook on
#                           Agent/Task) denies the over-cap spawn with a reason the
#                           model reads in-cycle — finish the work yourself, or propose
#                           a [CHARTER] entry to decisions.yaml and wait for the merge.
#                           Successor to v1's Registrar refusal. limits.global_max_agents
#                           is a CI-checked invariant: the tests fail any chart whose
#                           roster arithmetic (brains + max fan-out) exceeds it.
# daily_token_budget      → ENFORCED IN CODE: budget_gate.py + agent-run.sh brown out an
#                           over-budget agent — non-direct wakes skipped, direct wakes
#                           still run. Resets daily; bounds burn rate per agent, not
#                           total dollars (that's the spend breaker below).
# can_spend / can_deploy  → hints, not switches — no runtime code branches on them.
#                           The real backstop is capability-absence: no payment
#                           credentials exist for an agent to use, and prod deploys
#                           pause at the product repo's `production` environment.
#                           The human-in-the-loop approval interface is the Chairman's
#                           MERGE of a decisions.yaml PR (money, org-shape) and the
#                           Chairman's environment approval (deploys); git log and
#                           GitHub's environment log are the audit trail on top.
#
# A refused sub-team or an unapproved proposal is NOT an error. It is the governance
# protocol working correctly. Design your agents to propose-and-wait, not to retry
# until they get through.

# ── THE ORG-WIDE SPEND BREAKER (outside every envelope) ──────
# Two fuses, two blast radii — don't confuse them:
#
#   per-agent  envelope.daily_token_budget  →  TOKENS, brownout, one department
#   org-wide   SPEND_BREAKER_DAILY_USD      →  DOLLARS, hard hold, everyone
#
# Every Claude call is metered into state/spend.jsonl via spend_log.py (DESIGN.md
# invariant 3 — no unmetered calls). The runner (scripts/runner.py) sums today's
# metered cost; once it crosses SPEND_BREAKER_DAILY_USD (set in .env), it holds ALL
# wakes until the ledger rolls over to a new day. Unlike the per-agent brownout,
# there is no direct-wake exception: the dollar breaker is the last fuse before your
# card, so it trips the whole org. Set it to a number you could shrug at losing to a
# bug — once — and audit efficiency.py's cost-per-shipped-output before raising it.

# ── AGENT-LEVEL FIELDS (outside the envelope) ────────────────
# These sit on the department node itself: name, role, reports_to, model, teams.
# The chat-era extras (channel, cadence, bot_user_id, voice, active) left with the
# chat stack — wake routing now lives in wake-rules.yaml (dept:* labels route GitHub
# events), and pausing a department is an org-chart edit recorded in git (comment the
# node out with a dated note; re-charter later via a decisions.yaml [CHARTER] entry)
# rather than an `active: false` flag the old Registrar honored.

# ── GLOBAL CONFIG (org-chart.yaml `global:` + `limits:`) ─────
# Org-wide knobs. These are policy/behavior tuning, NOT authority — an agent can't
# widen its own authority by editing them; that's what the envelope and the Chairman's
# merge/environment gates are for.
#
# model_ids         — tier (haiku/sonnet/opus) → exact API model id. The SINGLE source
#                     of truth for tier→model resolution. A 💎 PROMOTE (a decisions.yaml
#                     entry now, not an emoji) changes an AGENT's tier; editing this map
#                     changes what a tier MEANS for the whole org. Pin ids so a
#                     provider's silent default can't drift you onto a different model.
# pm_stages         — the ordered kanban columns (To-Do, Doing, Staged, Demo, Done),
#                     defined in ONE place. github-pm-setup.sh builds the Project's
#                     Stage field from it; the Demo column is the [DEMO]-gate queue
#                     (safe.md).
# review_interval / — SAFe cadence (safe.md): an iteration = review_interval wakes;
# pi_interval         a PI = pi_interval iterations.
# unlock_wip_limit  — Chairman-queue discipline: past this many open human-only
#                     blockers, blockers.py prepends a WIP warning to every wake
#                     prompt — don't start work whose critical path ends in another
#                     human-only unlock. Prompt-enforced.
# global_max_agents — (under `limits:`) org-wide agent ceiling, CI-checked: the tests
#                     fail any chart whose roster arithmetic (every brain plus its
#                     full permitted fan-out) exceeds it. Runtime refusal of each
#                     agent's share is subagent_gate.py's job (max_subagents above).
